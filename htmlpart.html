<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Stress Test & Evaluation Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333333;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .panel {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #dddddd;
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 30px;
        }
        h2 {
            color: #333333;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #dddddd;
            padding-bottom: 5px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #cccccc;
            background: #ffffff;
            color: #333333;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            background: #107c41;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0b5930;
        }
        .subtitle {
            color: #666666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dddddd;
        }
        th {
            background: #f2f2f2;
            color: #333333;
        }
        .rank-1 td {
            background: #edf7ed;
            font-weight: bold;
        }
        .terminal {
            background: #111111;
            font-family: monospace;
            padding: 15px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            color: #ffffff;
            white-space: pre-wrap;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Algorithmic Trading Stress Test Arena</h1>

    <div class="container">
        <div class="panel">
            <h2>Contestant Submission Portal</h2>
            <form id="uploadForm">
                <label for="contestantName">Contestant Name / ID</label>
                <input type="text" id="contestantName" placeholder="e.g., Team_Alpha" required autocomplete="off">

                <label for="languageSelect">Algorithm Language</label>
                <select id="languageSelect">
                    <option value="cpp">C++ (.cpp)</option>
                    <option value="python">Python (.py)</option>
                    <option value="go">Go (.go)</option>
                    <option value="java">Java (.java)</option>
                    <option value="rust">Rust (.rs)</option>
                </select>

                <label for="codeFile">Source Code File</label>
                <input type="file" id="codeFile" required>

                <button type="submit">Deploy & Initiate Stress Test</button>
            </form>

            <h2 style="margin-top: 30px;">Evaluation Log</h2>
            <div class="terminal" id="errorTerminal">System idle. Ready for instruction.</div>
        </div>

        <div class="panel">
            <h2>Live Telemetry & Standings</h2>
            <div class="subtitle">Ranking Rule: Accuracy ➔ Stability ➔ Speed</div>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Contestant</th>
                        <th>Accuracy</th>
                        <th>Stability</th>
                        <th>Speed</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
